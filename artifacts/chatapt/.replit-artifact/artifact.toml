kind = "web"
previewPath = "/"
title = "ChatAPT"
version = "1.0.0"
id = "artifacts/chatapt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23809

[services.development]
run = "pnpm --filter @workspace/chatapt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatapt", "run", "build" ]
publicDir = "artifacts/chatapt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23809"
BASE_PATH = "/"
